<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employees - SOPHIA-ACADEMY HR</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="images/logo.jpeg" alt="Sophia Academy"
                    style="width: 36px; height: 36px; object-fit: contain; flex-shrink: 0;">
                <div class="logo-text">SOPHIA-ACADEMY HR</div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="ph ph-squares-four nav-icon"></i>
                    Dashboard
                </a>
                <a href="emp.html" class="nav-item active admin-only">
                    <i class="ph ph-users nav-icon"></i>
                    Employees
                </a>
                <a href="attendance.html" class="nav-item admin-only">
                    <i class="ph ph-calendar-check nav-icon"></i>
                    Attendance
                </a>
                <a href="leave.html" class="nav-item">
                    <i class="ph ph-briefcase nav-icon"></i>
                    Leaves
                </a>
            </nav>
        </aside>

        <!-- Main Wrapper -->
        <div class="main-wrapper">
            <!-- Header -->
            <header class="top-header">
                <button class="menu-toggle" id="menuToggle">
                    <i class="ph ph-list"></i>
                </button>

                <div class="header-right" style="margin-left: auto;">
                    <button class="btn btn-outline"
                        style="border: none; border-radius: 50%; width: 40px; height: 40px; padding: 0; color: var(--text-muted); display: flex; align-items: center; justify-content: center; position: relative;">
                        <i class="ph ph-bell" style="font-size: 20px;"></i>
                    </button>
                    <div class="user-profile" style="cursor: pointer;">
                        <div class="avatar">AD</div>
                        <div class="user-info" style="display: flex; flex-direction: column;">
                            <span class="name">Admin User</span>
                            <span class="role">HR Manager</span>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Content -->
            <main class="content-area">
                <div class="page-header">
                    <div>
                        <h1 class="page-title">Employee Directory</h1>
                        <p class="page-subtitle">Browse employees created through the signup flow.</p>
                    </div>
                </div>

                <!-- Filters & Search -->
                <div class="card" style="margin-bottom: 24px;">
                    <div class="card-body" style="padding: 16px 24px;">
                        <div style="display: flex; gap: 16px; flex-wrap: wrap;">
                            <div style="flex: 1; min-width: 250px; position: relative;">
                                <i class="ph ph-magnifying-glass"
                                    style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 18px;"></i>
                                <input type="text" id="employeeSearchInput" class="form-control"
                                    placeholder="Search employees by name, role or email..."
                                    style="padding-left: 44px; margin: 0; width: 100%;">
                            </div>
                            <div style="width: 200px;">
                                <select class="form-control" style="margin: 0;" id="empDeptFilter">
                                    <option value="">All Departments</option>
                                    <option value="engineering">Engineering</option>
                                    <option value="design">Design</option>
                                    <option value="hr">Human Resources</option>
                                </select>
                            </div>
                            <div style="width: 200px;">
                                <select class="form-control" style="margin: 0;" id="empStatusFilter">
                                    <option value="">All Statuses</option>
                                    <option value="active">Active</option>
                                    <option value="onleave">On Leave</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Employee Table -->
                <div class="card">
                    <div class="table-responsive">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>Employee</th>
                                    <th>Department</th>
                                    <th>Role</th>
                                    <th>Join Date</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="employeeTableBody">
                                <tr>
                                    <td colspan="6" style="text-align: center; padding: 20px;" class="text-muted">
                                        Loading employees...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Pagination -->
                    <div
                        style="padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
                        <span class="text-muted" style="font-size: 13px;">Showing 1 to 5 of 124 entries</span>
                        <div style="display: flex; gap: 8px;">
                            <button class="btn btn-outline" style="padding: 6px 12px; font-size: 13px;"
                                disabled>Previous</button>
                            <button class="btn btn-primary" style="padding: 6px 12px; font-size: 13px;">1</button>
                            <button class="btn btn-outline" style="padding: 6px 12px; font-size: 13px;">2</button>
                            <button class="btn btn-outline" style="padding: 6px 12px; font-size: 13px;">3</button>
                            <span
                                style="display: flex; align-items: center; padding: 0 4px; color: var(--text-muted);">...</span>
                            <button class="btn btn-outline" style="padding: 6px 12px; font-size: 13px;">25</button>
                            <button class="btn btn-outline" style="padding: 6px 12px; font-size: 13px;">Next</button>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
